# Hermes Agent — Railway Configuration
# Pre-configured for Discord gateway with direct Anthropic API.
# Environment variables (ANTHROPIC_API_KEY, DISCORD_BOT_TOKEN) are
# injected by Railway and loaded from the container's .env file.

model:
  default: "claude-sonnet-4-6"
  provider: "anthropic"

gateway:
  platforms:
    - discord

terminal:
  backend: local

compression:
  enabled: true
